<!-- Styles.html — Cleverclip design system. Do not re-colour. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #231F20;
    --paper: #FAF8F2;
    --lime: #E4DE50;
    --ink-soft: #4a4546;
    --line: #e7e2d8;
    --card: #ffffff;
    --danger: #b3261e;
    --ok: #2f7d4f;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(35,31,32,.06), 0 8px 24px rgba(35,31,32,.06);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    font-size: 15px;
    line-height: 1.5;
  }

  h1, h2, h3 { font-family: 'Caprasimo', Georgia, serif; font-weight: 400; letter-spacing: .2px; }

  a { color: var(--ink); }

  /* ---------- Topbar (reference: Creative Corner) ---------- */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 14px;
    padding: 14px 22px;
    background: var(--ink);
    color: var(--paper);
    border-bottom: 4px solid var(--lime);
  }
  .topbar .brand {
    font-family: 'Caprasimo', Georgia, serif;
    font-size: 20px; color: var(--paper);
  }
  .topbar .brand b { color: var(--lime); }
  .topbar .title {
    font-size: 13px; color: #cfcac3; font-weight: 500;
    padding-left: 14px; margin-left: 2px;
    border-left: 1px solid #4a4546;
  }
  .topbar .spacer { flex: 1; }
  .topbar .who { font-size: 12px; color: #cfcac3; }

  /* ---------- Layout ---------- */
  .wrap { max-width: 1080px; margin: 0 auto; padding: 26px 22px 80px; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .muted { color: var(--ink-soft); }
  .small { font-size: 12.5px; }
  .hidden { display: none !important; }

  /* ---------- Cards ---------- */
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 18px 20px;
  }
  .card + .card { margin-top: 16px; }

  /* ---------- Buttons ---------- */
  .btn {
    appearance: none; cursor: pointer;
    font-family: inherit; font-size: 14px; font-weight: 600;
    border-radius: 10px; padding: 9px 16px;
    border: 1px solid var(--ink);
    background: var(--ink); color: var(--paper);
    transition: transform .04s ease, opacity .15s ease;
  }
  .btn:hover { opacity: .92; }
  .btn:active { transform: translateY(1px); }
  .btn:disabled { opacity: .45; cursor: not-allowed; }
  .btn.primary { background: var(--lime); color: var(--ink); border-color: var(--ink); }
  .btn.ghost { background: transparent; color: var(--ink); }
  .btn.danger { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn.sm { padding: 6px 11px; font-size: 12.5px; }

  /* ---------- Upload dropzone ---------- */
  .drop {
    border: 2px dashed var(--line);
    border-radius: var(--radius);
    background: #fffdf8;
    padding: 30px; text-align: center;
    transition: border-color .15s ease, background .15s ease;
  }
  .drop.over { border-color: var(--lime); background: #fbfae9; }
  .drop h3 { margin: 0 0 6px; }

  /* ---------- Inputs ---------- */
  input[type=text], select, textarea {
    font-family: inherit; font-size: 14px; color: var(--ink);
    background: #fff; border: 1px solid var(--line); border-radius: 9px;
    padding: 8px 10px; width: 100%;
  }
  input:focus, select:focus, textarea:focus { outline: 2px solid var(--lime); border-color: var(--lime); }
  label.field { display: block; }
  label.field > span { display: block; font-size: 12px; font-weight: 600; color: var(--ink-soft); margin-bottom: 4px; }

  /* ---------- Project list ---------- */
  .project {
    display: grid; grid-template-columns: 1fr auto; gap: 8px 16px;
    align-items: center;
    padding: 14px 16px; border: 1px solid var(--line);
    border-radius: 12px; background: #fff;
  }
  .project + .project { margin-top: 10px; }
  .project .name { font-weight: 600; }
  .project .meta { font-size: 12.5px; color: var(--ink-soft); }

  /* ---------- Badges & progress ---------- */
  .badge { display: inline-block; font-size: 11.5px; font-weight: 700;
    padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line); }
  .badge.New { background: #f3f1ea; color: var(--ink-soft); }
  .badge.In-progress { background: #fbfae9; color: #7a5d00; border-color: #efe9b0; }
  .badge.Done { background: #e7f3ec; color: var(--ok); border-color: #c4e3d0; }

  .bar { height: 6px; border-radius: 999px; background: #eee9df; overflow: hidden; min-width: 120px; }
  .bar > i { display: block; height: 100%; background: var(--lime); }

  /* ---------- Segment editor ---------- */
  .seg {
    display: grid; grid-template-columns: 44px 1fr 1fr; gap: 12px;
    padding: 12px 0; border-top: 1px solid var(--line); align-items: start;
  }
  .seg .ix { color: var(--ink-soft); font-size: 12.5px; padding-top: 8px; }
  .seg .src { white-space: pre-wrap; padding: 8px 10px; background: #faf8f2; border-radius: 9px; border: 1px solid var(--line); }
  .seg textarea { min-height: 44px; resize: vertical; }
  .seg.head { font-weight: 700; font-size: 12px; color: var(--ink-soft); border-top: none; }
  .seg.head > div { padding: 0; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%);
    background: var(--ink); color: var(--paper);
    padding: 10px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 500;
    box-shadow: var(--shadow); opacity: 0; pointer-events: none;
    transition: opacity .2s ease, transform .2s ease;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
  #toast.err { background: var(--danger); }

  .spinner {
    display: inline-block; width: 15px; height: 15px; vertical-align: -2px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
    border-radius: 50%; animation: spin .7s linear infinite;
  }
  .btn.primary .spinner, .btn.ghost .spinner { border-color: rgba(35,31,32,.3); border-top-color: var(--ink); }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
